<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f5f7fa;--card:#fff;--border:#e8eaed;
  --text:#333;--text2:#888;--text3:#bbb;
  --red:#e74c3c;--green:#27ae60;--blue:#5b8ff9;--purple:#8e44ad;--orange:#e67e22;
  --red-bg:#fcebeb;--green-bg:#eaf3de;--blue-bg:#e6f1fb;--purple-bg:#eeedfe;--orange-bg:#faeeda;
  --radius:10px;--radius-sm:6px;
}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);padding:16px}
.container{max-width:1100px;margin:0 auto}

/* Controls bar */
.controls{display:flex;flex-wrap:wrap;gap:10px;align-items:center;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 18px;margin-bottom:10px}
.control-group{display:flex;align-items:center;gap:6px}
.control-group label{font-size:12px;color:var(--text2);white-space:nowrap}
.control-group select,.control-group input[type=number]{font-size:13px;border:1px solid var(--border);border-radius:var(--radius-sm);padding:5px 8px;background:var(--card);color:var(--text)}
.control-group select{cursor:pointer}
.param-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:8px;margin-bottom:10px}
.param-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px}
.param-card .head{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.param-card .head .name{font-size:13px;font-weight:500;display:flex;align-items:center;gap:6px}
.param-card .head .name .dot{width:10px;height:10px;border-radius:2px;display:inline-block}
.param-card .body{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.param-card label{font-size:11px;color:var(--text2)}
.param-card input[type=range]{flex:1;min-width:60px;height:4px;accent-color:var(--blue)}
.param-card input[type=number]{width:48px;font-size:12px;text-align:center;border:1px solid var(--border);border-radius:4px;padding:3px}
.toggle{width:16px;height:16px;border:1px solid var(--border);border-radius:3px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-size:10px;background:var(--card);color:transparent;transition:.15s}
.toggle.on{background:var(--blue);border-color:var(--blue);color:#fff}
.btn{font-size:12px;border:1px solid var(--border);border-radius:var(--radius-sm);padding:5px 12px;cursor:pointer;background:var(--card);color:var(--text2);transition:.15s}
.btn:hover{border-color:#bbb;color:var(--text)}

/* Chart area */
.chart-wrap{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px}
#mainChart{width:100%;height:580px}

/* Signal summary */
.signal-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:10px}
.signal-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:12px;text-align:center}
.signal-card .label{font-size:11px;color:var(--text2);margin-bottom:2px}
.signal-card .value{font-size:22px;font-weight:500;margin:2px 0}
.signal-card .tag{font-size:11px;padding:2px 10px;border-radius:10px;display:inline-block;background:var(--bg);color:var(--text2)}

/* Data table */
.table-wrap{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;margin-bottom:10px;overflow-x:auto}
.table-wrap .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.table-wrap .header span{font-size:13px;font-weight:500}
.table-wrap .header .note{font-size:11px;color:var(--text2);font-weight:400}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;color:var(--text2);font-weight:400;border-bottom:1px solid var(--border);padding:4px 6px}
td{padding:3px 6px;border-bottom:1px solid #f0f0f0;white-space:nowrap;font-variant-numeric:tabular-nums}
tr:hover td{background:#f8f9fa}
.up{color:var(--red)}
.down{color:var(--green)}

@media(max-width:700px){
  .signal-grid{grid-template-columns:repeat(2,1fr)}
  .param-grid{grid-template-columns:1fr 1fr}
}
</style>
</head>

// Data loader - reads from data/raw/ CSV files
// For demo, data is fetched from server; in production, embedded
async function loadStockData() {
  const codes = ['002594.SZ','600031.SH','600900.SH','688981.SH'];
  let loaded = 0;
  for (const code of codes) {
    try {
      const resp = await fetch(`data/raw/${code}_20250703_20260703.csv`);
      if (!resp.ok) throw new Error('not found');
      const text = await resp.text();
      const rows = text.trim().split('\n').slice(1);
      STOCK_DATA[code] = rows.map(r => {
        const c = r.split(',');
        return {
          date: c[1], open: +c[2], high: +c[3], low: +c[4],
          close: +c[5], pre_close: +c[6], change: +c[7],
          pct_chg: +c[8], vol: +c[9], amount: +c[10]

function calcRSI(data, period) {
  const rsi = new Array(data.length).fill(null);
  if (data.length < period + 1) return rsi;
  let gains = 0, losses = 0;
  for (let i = 1; i <= period; i++) {
    const d = data[i].close - data[i-1].close;
    gains += Math.max(d, 0);
    losses += Math.max(-d, 0);
  }
  let avgG = gains / period, avgL = losses / period;
  rsi[period] = avgL === 0 ? 100 : 100 - 100 / (1 + avgG / avgL);
  for (let i = period + 1; i < data.length; i++) {
    const d = data[i].close - data[i-1].close;
    avgG = (avgG * (period - 1) + Math.max(d, 0)) / period;
    avgL = (avgL * (period - 1) + Math.max(-d, 0)) / period;
    rsi[i] = avgL === 0 ? 100 : 100 - 100 / (1 + avgG / avgL);
  }
  return rsi;
}

function calcEMA(data, period) {
  const k = 2 / (period + 1);
  const result = new Array(data.length).fill(null);
  let sum = 0;
  for (let i = 0; i < period && i < data.length; i++) sum += data[i];
  result[period - 1] = sum / period;
  for (let i = period; i < data.length; i++)
    result[i] = (data[i] - result[i-1]) * k + result[i-1];
  return result;
}

function calcMACD(data, fast, slow, signal) {
  const closes = data.map(d => d.close);
  const emaF = calcEMA(closes, fast);
  const emaS = calcEMA(closes, slow);
  const dif = emaF.map((v, i) => v !== null && emaS[i] !== null ? v - emaS[i] : null);
  const validDIF = dif.filter(v => v !== null);
  const deaArr = calcEMA(validDIF, signal);
  let deaIdx = 0;
  const dea = dif.map(v => v !== null ? deaArr[deaIdx++] : null);
  const hist = dif.map((v, i) => v !== null && dea[i] !== null ? v - dea[i] : null);
  return { dif, dea, hist };
}

function calcBB(data, period, std) {
  const upper = new Array(data.length).fill(null);
  const mid = new Array(data.length).fill(null);
  const lower = new Array(data.length).fill(null);
  const bw = new Array(data.length).fill(null);
  const pctb = new Array(data.length).fill(null);
  for (let i = period - 1; i < data.length; i++) {
    let sum = 0, sumSq = 0;
    for (let j = i - period + 1; j <= i; j++) {
      sum += data[j].close;
      sumSq += data[j].close * data[j].close;
    }
    const m = sum / period;
    const sd = Math.sqrt(sumSq / period - m * m);
    mid[i] = m; upper[i] = m + std * sd; lower[i] = m - std * sd;
    bw[i] = ((upper[i] - lower[i]) / mid[i]) * 100;
    pctb[i] = (data[i].close - lower[i]) / (upper[i] - lower[i]);
  }
  return { upper, mid, lower, bandwidth: bw, pctb };
}

function calcATR(data, period) {
  const tr = new Array(data.length).fill(null);
  for (let i = 1; i < data.length; i++) {
    const hl = data[i].high - data[i].low;
    const hc = Math.abs(data[i].high - data[i-1].close);
    const lc = Math.abs(data[i].low - data[i-1].close);
    tr[i] = Math.max(hl, hc, lc);
  }
  const atr = new Array(data.length).fill(null);
  let sum = 0;
  for (let i = 1; i <= period && i < data.length; i++) sum += tr[i];
  atr[period] = sum / period;
  for (let i = period + 1; i < data.length; i++)
    atr[i] = (atr[i-1] * (period - 1) + tr[i]) / period;
  return { tr, atr };
}

// Main App
// ══════════════════════════════════════════════════════════

let chart = null;
let currentData = [];

const DEFAULTS = {
  rsi: { period: 14, enabled: true },
  macd: { fast: 12, slow: 26, signal: 9, enabled: true },
  bb: { period: 20, std: 2, enabled: true },
  atr: { period: 14, enabled: true }
};
const params = JSON.parse(JSON.stringify(DEFAULTS));

function fmtDate(d) {
  if (!d) return '';
  const s = String(d);
  return `${s.slice(0,4)}-${s.slice(4,6)}-${s.slice(6,8)}`;
}
function shortDate(d) {
  if (!d) return '';
  const s = String(d);
  return `${s.slice(4,6)}-${s.slice(6,8)}`;
}

// Build param panel
function buildParamPanel() {
  const html = `
    <div class="param-card">
      <div class="head"><span class="name"><span class="dot" style="background:var(--purple)"></span>rsi</span><span style="font-size:11px;color:var(--text2)">period</span></div>
      <div class="body">
        <div class="toggle ${params.rsi.enabled?'on':''}" data-key="rsi" data-toggle>${params.rsi.enabled?'&#10003;':''}</div>
        <input type="range" min="2" max="50" value="${params.rsi.period}" data-key="rsi" data-param="period" ${params.rsi.enabled?'':'disabled'}>
        <input type="number" min="2" max="50" value="${params.rsi.period}" data-key="rsi" data-param="period" ${params.rsi.enabled?'':'disabled'}>
      </div>
    </div>
    <div class="param-card">
      <div class="head"><span class="name"><span class="dot" style="background:var(--blue)"></span>macd</span><span style="font-size:11px;color:var(--text2)">fast / slow / signal</span></div>
      <div class="body">
        <div class="toggle ${params.macd.enabled?'on':''}" data-key="macd" data-toggle>${params.macd.enabled?'&#10003;':''}</div>
        <label>f</label><input type="number" min="2" max="100" value="${params.macd.fast}" data-key="macd" data-param="fast" ${params.macd.enabled?'':'disabled'} style="width:40px">
        <label>s</label><input type="number" min="2" max="100" value="${params.macd.slow}" data-key="macd" data-param="slow" ${params.macd.enabled?'':'disabled'} style="width:40px">
        <label>sig</label><input type="number" min="2" max="50" value="${params.macd.signal}" data-key="macd" data-param="signal" ${params.macd.enabled?'':'disabled'} style="width:40px">
      </div>
    </div>
    <div class="param-card">
      <div class="head"><span class="name"><span class="dot" style="background:var(--green)"></span>bollinger</span><span style="font-size:11px;color:var(--text2)">period / std</span></div>
      <div class="body">
        <div class="toggle ${params.bb.enabled?'on':''}" data-key="bb" data-toggle>${params.bb.enabled?'&#10003;':''}</div>
        <label>p</label><input type="number" min="2" max="100" value="${params.bb.period}" data-key="bb" data-param="period" ${params.bb.enabled?'':'disabled'} style="width:44px">
        <label>σ</label><input type="number" min="0.5" max="5" step="0.5" value="${params.bb.std}" data-key="bb" data-param="std" ${params.bb.enabled?'':'disabled'} style="width:44px">
      </div>
    </div>
    <div class="param-card">
      <div class="head"><span class="name"><span class="dot" style="background:var(--orange)"></span>atr</span><span style="font-size:11px;color:var(--text2)">period</span></div>
      <div class="body">
        <div class="toggle ${params.atr.enabled?'on':''}" data-key="atr" data-toggle>${params.atr.enabled?'&#10003;':''}</div>
        <input type="range" min="2" max="50" value="${params.atr.period}" data-key="atr" data-param="period" ${params.atr.enabled?'':'disabled'}>
        <input type="number" min="2" max="50" value="${params.atr.period}" data-key="atr" data-param="period" ${params.atr.enabled?'':'disabled'}>
      </div>
    </div>
  `;
  document.getElementById('paramPanel').innerHTML = html;
}

// Compute all indicators for a dataset
function computeAll(data) {
  const rsi = params.rsi.enabled ? calcRSI(data, params.rsi.period) : [];
  const macd = params.macd.enabled ? calcMACD(data, params.macd.fast, params.macd.slow, params.macd.signal) : { dif: [], dea: [], hist: [] };
  const bb = params.bb.enabled ? calcBB(data, params.bb.period, params.bb.std) : { upper: [], mid: [], lower: [], bandwidth: [], pctb: [] };
  const atr = params.atr.enabled ? calcATR(data, params.atr.period) : { tr: [], atr: [] };
  return { rsi, macd, bb, atr };
}

function getDates(data) {
  return data.map(d => fmtDate(d.date));
}

// Render chart
function render(data, ind) {
  if (!chart) {
    chart = echarts.init(document.getElementById('mainChart'));
    window.addEventListener('resize', () => chart.resize());
  }

  const dates = getDates(data);
  const closes = data.map(d => d.close);
  const vol = data.map(d => d.vol);
  const pct = data.map(d => d.pct_chg);

  // RSI grid
  const hasRSI = params.rsi.enabled;
  const hasMACD = params.macd.enabled;
  const hasATR = params.atr.enabled;

  // Calculate grid heights
  let topH = 3, extra = 0;
  if (hasMACD) extra += 1.2;
  if (hasRSI) extra += 1;
  if (hasATR) extra += 0.8;
  const heights = [topH];
  if (hasMACD) heights.push(1.2);
  if (hasRSI) heights.push(1);
  if (hasATR) heights.push(0.8);

  const grids = [];
  const series = [];
  let yIdx = 0;

  function addGrid(topPct, heightPct) {
    grids.push({
      left: '50', right: '30', top: topPct + '%', height: heightPct + '%'
    });
    return yIdx++;
  }

  // Compute grid positions
  const totalH = heights.reduce((a, b) => a + b, 0);
  let curTop = 1;
  const gridDefs = heights.map(h => {
    const pct = h / totalH * 94;
    const g = { left: '55', right: '20', top: curTop + '%', height: pct + '%' };
    curTop += pct + 0.3;
    return g;
  });

  const xAxes = [];
  const yAxes = [];

  // Main price panel
  const g0 = gridDefs[0];
  xAxes.push({ type: 'category', data: dates, gridIndex: 0, axisLine: { show: false }, axisTick: { show: false }, axisLabel: { show: false } });
  yAxes.push({ type: 'value', gridIndex: 0, splitLine: { lineStyle: { color: '#f0f0f0', type: 'dashed' } }, axisLabel: { fontSize: 10, color: '#999' } });

  // Close price
  series.push({
    name: 'close', type: 'line', data: closes,
    xAxisIndex: 0, yAxisIndex: 0,
    smooth: true, symbol: 'none',
    lineStyle: { width: 1.5, color: '#e74c3c' },
    areaStyle: { color: { type: 'linear', x: 0, y: 0, x2: 0, y2: 1, colorStops: [{ offset: 0, color: 'rgba(231,76,60,0.2)' }, { offset: 1, color: 'rgba(231,76,60,0.02)' }] } }
  });

  // Bollinger Bands
  if (params.bb.enabled && ind.bb.upper[0] !== undefined) {
    const valid = ind.bb.upper.filter(v => v !== null).length > 0;
    if (valid) {
      series.push({ name: 'bb-upper', type: 'line', data: ind.bb.upper, xAxisIndex: 0, yAxisIndex: 0, smooth: true, symbol: 'none', lineStyle: { width: 0.8, color: '#5b8ff9', opacity: 0.5 } });
      series.push({ name: 'bb-mid', type: 'line', data: ind.bb.mid, xAxisIndex: 0, yAxisIndex: 0, smooth: true, symbol: 'none', lineStyle: { width: 0.8, color: '#f39c12', opacity: 0.6 } });
      series.push({ name: 'bb-lower', type: 'line', data: ind.bb.lower, xAxisIndex: 0, yAxisIndex: 0, smooth: true, symbol: 'none', lineStyle: { width: 0.8, color: '#5b8ff9', opacity: 0.5 }, areaStyle: { origin: data.length-1, color: { type: 'linear', x: 0, y: 0, x2: 0, y2: 1, colorStops: [{ offset: 0, color: 'rgba(91,143,249,0.06)' }, { offset: 1, color: 'rgba(91,143,249,0.01)' }] } } });
    }
  }

  let gIdx = 1;

  // MACD panel
  if (hasMACD) {
    const g = gridDefs[gIdx];
    xAxes.push({ type: 'category', data: dates, gridIndex: gIdx, axisLine: { show: false }, axisTick: { show: false }, axisLabel: { show: false } });
    yAxes.push({ type: 'value', gridIndex: gIdx, splitLine: { lineStyle: { color: '#f0f0f0', type: 'dashed' } }, axisLabel: { fontSize: 10, color: '#999' } });
    const valid = ind.macd.dif.some(v => v !== null);
    if (valid) {
      series.push({ name: 'macd-dif', type: 'line', data: ind.macd.dif, xAxisIndex: gIdx, yAxisIndex: gIdx, smooth: true, symbol: 'none', lineStyle: { width: 1, color: '#e74c3c' } });
      series.push({ name: 'macd-dea', type: 'line', data: ind.macd.dea, xAxisIndex: gIdx, yAxisIndex: gIdx, smooth: true, symbol: 'none', lineStyle: { width: 1, color: '#5b8ff9' } });
      series.push({ name: 'macd-hist', type: 'bar', data: ind.macd.hist, xAxisIndex: gIdx, yAxisIndex: gIdx, barWidth: '50%', itemStyle: { color: (p) => p.value >= 0 ? '#e74c3c' : '#27ae60', opacity: 0.4 } });
    }
    gIdx++;
  }

  // RSI panel
  if (hasRSI) {
    const g = gridDefs[gIdx];
    xAxes.push({ type: 'category', data: dates, gridIndex: gIdx, axisLine: { show: false }, axisTick: { show: false }, axisLabel: { show: false } });
    yAxes.push({ type: 'value', gridIndex: gIdx, min: 0, max: 100, splitLine: { lineStyle: { color: '#f0f0f0', type: 'dashed' } }, axisLabel: { fontSize: 10, color: '#999' } });
    const valid = ind.rsi.some(v => v !== null);
    if (valid) {
      series.push({ name: 'rsi', type: 'line', data: ind.rsi, xAxisIndex: gIdx, yAxisIndex: gIdx, smooth: true, symbol: 'none', lineStyle: { width: 1.2, color: '#8e44ad' },
        markLine: { silent: true, symbol: 'none', data: [{ yAxis: 70, lineStyle: { color: '#e74c3c', type: 'dashed', width: 0.7 } }, { yAxis: 30, lineStyle: { color: '#27ae60', type: 'dashed', width: 0.7 } }], label: { show: false } }
      });
    }
    gIdx++;
  }

  // ATR panel (last one gets x-axis labels)
  if (hasATR) {
    const g = gridDefs[gIdx];
    xAxes.push({ type: 'category', data: dates, gridIndex: gIdx, axisLine: { show: false }, axisTick: { show: false }, axisLabel: { fontSize: 10, color: '#999', interval: 50 } });
    yAxes.push({ type: 'value', gridIndex: gIdx, splitLine: { lineStyle: { color: '#f0f0f0', type: 'dashed' } }, axisLabel: { fontSize: 10, color: '#999' } });
    const valid = ind.atr.atr.some(v => v !== null);
    if (valid) {
      series.push({ name: 'atr', type: 'line', data: ind.atr.atr, xAxisIndex: gIdx, yAxisIndex: gIdx, smooth: true, symbol: 'none', lineStyle: { width: 1.2, color: '#e67e22' }, areaStyle: { color: { type: 'linear', x: 0, y: 0, x2: 0, y2: 1, colorStops: [{ offset: 0, color: 'rgba(230,126,34,0.3)' }, { offset: 1, color: 'rgba(230,126,34,0.02)' }] } } });
    }
    gIdx++;
  }

  const option = {
    tooltip: {
      trigger: 'axis',
      backgroundColor: 'rgba(255,255,255,0.96)',
      borderColor: '#e8e8e8', borderWidth: 1,
      textStyle: { color: '#333', fontSize: 12 },
      formatter: function(ps) {
        if (!ps.length) return '';
        const idx = ps[0].dataIndex;
        const d = data[idx];
        let h = `<div style="font-weight:500;margin-bottom:4px">${fmtDate(d.date)}</div>`;
        h += `<div>open: <b>${d.open.toFixed(2)}</b> &nbsp; close: <b>${d.close.toFixed(2)}</b></div>`;
        h += `<div>high: <b>${d.high.toFixed(2)}</b> &nbsp; low: <b>${d.low.toFixed(2)}</b></div>`;
        h += `<div>change: <b style="color:${d.pct_chg>=0?'#e74c3c':'#27ae60'}">${d.pct_chg.toFixed(2)}%</b></div>`;
        ps.forEach(p => {
          if (p.value === null || p.value === undefined || p.value === '') return;
          const name = p.seriesName || '';
          if (['bb-upper','bb-mid','bb-lower','close'].includes(name)) return;
          if (typeof p.value === 'number')
            h += `<div>${name}: <b>${p.value.toFixed(2)}</b></div>`;
        });
        return h;
      }
    },
    grid: gridDefs,
    xAxis: xAxes,
    yAxis: yAxes,
    dataZoom: [{ type: 'inside', xAxisIndex: [0,1,2,3], start: 0, end: 100 }],
    series: series
  };

  chart.setOption(option, true);
}

// Signal summary
function renderSignals(data, ind) {
  const last = data[data.length - 1];
  const rsiVal = ind.rsi[ind.rsi.length - 1];
  const macdDif = ind.macd.dif[ind.macd.dif.length - 1];
  const macdDea = ind.macd.dea[ind.macd.dea.length - 1];
  const bbUpper = ind.bb.upper[ind.bb.upper.length - 1];
  const bbLower = ind.bb.lower[ind.bb.lower.length - 1];
  const bbMid = ind.bb.mid[ind.bb.mid.length - 1];
  const pctb = ind.bb.pctb[ind.bb.pctb.length - 1];
  const atrVal = ind.atr.atr[ind.atr.atr.length - 1];

  let rsiSignal = 'neutral', rsiColor = 'var(--text2)', rsiBg = 'var(--bg)';
  if (rsiVal !== null && rsiVal !== undefined) {
    if (rsiVal > 70) { rsiSignal = 'overbought'; rsiColor = 'var(--red)'; rsiBg = 'var(--red-bg)'; }
    else if (rsiVal < 30) { rsiSignal = 'oversold'; rsiColor = 'var(--green)'; rsiBg = 'var(--green-bg)'; }
  }

  let macdSignal = '--', macdColor = 'var(--text2)', macdBg = 'var(--bg)';
  if (macdDif !== null && macdDea !== null) {
    if (macdDif > macdDea) { macdSignal = 'bullish (dif>dea)'; macdColor = 'var(--red)'; macdBg = 'var(--red-bg)'; }
    else { macdSignal = 'bearish (dif<dea)'; macdColor = 'var(--green)'; macdBg = 'var(--green-bg)'; }
  }

  let bbSignal = '--', bbColor = 'var(--text2)', bbBg = 'var(--bg)';
  if (last && bbUpper !== null) {
    if (last.close > bbUpper) { bbSignal = 'above upper'; bbColor = 'var(--red)'; bbBg = 'var(--red-bg)'; }
    else if (last.close < bbLower) { bbSignal = 'below lower'; bbColor = 'var(--green)'; bbBg = 'var(--green-bg)'; }
    else { bbSignal = 'mid range'; }
  }

  let atrSignal = '--', atrColor = 'var(--text2)';
  if (atrVal !== null && last) {
    const ratio = atrVal / last.close * 100;
    atrSignal = ratio.toFixed(1) + '% of price';
  }

  document.getElementById('signalPanel').innerHTML = `
    <div class="signal-card">
      <div class="label">rsi (${params.rsi.period})</div>
      <div class="value" style="color:${rsiColor}">${rsiVal !== null && rsiVal !== undefined ? rsiVal.toFixed(1) : '--'}</div>
      <div class="tag" style="background:${rsiBg};color:${rsiColor}">${rsiSignal}</div>
    </div>
    <div class="signal-card">
      <div class="label">macd (${params.macd.fast}/${params.macd.slow}/${params.macd.signal})</div>
      <div class="value" style="color:${macdColor}">${macdDif !== null ? macdDif.toFixed(2) : '--'}</div>
      <div class="tag" style="background:${macdBg};color:${macdColor}">${macdSignal}</div>
    </div>
    <div class="signal-card">
      <div class="label">bollinger (${params.bb.period}, ${params.bb.std})</div>
      <div class="value" style="color:var(--green)">${pctb !== null && pctb !== undefined ? pctb.toFixed(2) : '--'}</div>
      <div class="tag" style="background:${bbBg};color:${bbColor}">%b = ${bbSignal}</div>
    </div>
    <div class="signal-card">
      <div class="label">atr (${params.atr.period})</div>
      <div class="value" style="color:var(--orange)">${atrVal !== null ? atrVal.toFixed(2) : '--'}</div>
      <div class="tag">${atrSignal}</div>
    </div>
  `;
}

// Data table
function renderTable(data, ind) {
  const show = data.slice(-10);
  const html = ['<thead><tr><th>date</th><th>open</th><th>high</th><th>low</th><th>close</th><th>chg%</th>'];
  if (params.rsi.enabled) html.push('<th>rsi</th>');
  if (params.macd.enabled) html.push('<th>dif</th><th>dea</th>');
  if (params.bb.enabled) html.push('<th>%b</th>');
  if (params.atr.enabled) html.push('<th>atr</th>');
  html.push('</tr></thead><tbody>');

  show.forEach((d, i) => {
    const idx = data.indexOf(d);
    const cls = d.pct_chg >= 0 ? 'up' : 'down';
    html.push(`<tr><td>${shortDate(d.date)}</td><td>${d.open.toFixed(2)}</td><td>${d.high.toFixed(2)}</td><td>${d.low.toFixed(2)}</td><td class="${cls}">${d.close.toFixed(2)}</td><td class="${cls}">${d.pct_chg.toFixed(2)}</td>`);
    if (params.rsi.enabled) html.push(`<td>${ind.rsi[idx] !== null && ind.rsi[idx] !== undefined ? ind.rsi[idx].toFixed(1) : '--'}</td>`);
    if (params.macd.enabled) html.push(`<td>${ind.macd.dif[idx] !== null ? ind.macd.dif[idx].toFixed(2) : '--'}</td><td>${ind.macd.dea[idx] !== null ? ind.macd.dea[idx].toFixed(2) : '--'}</td>`);
    if (params.bb.enabled) html.push(`<td>${ind.bb.pctb[idx] !== null ? ind.bb.pctb[idx].toFixed(2) : '--'}</td>`);
    if (params.atr.enabled) html.push(`<td>${ind.atr.atr[idx] !== null ? ind.atr.atr[idx].toFixed(2) : '--'}</td>`);
    html.push('</tr>');
  });
  html.push('</tbody>');
  document.getElementById('dataTable').innerHTML = html.join('');
  document.getElementById('tableInfo').textContent = `showing last ${show.length} of ${data.length} rows`;
}

// Main update
function update() {
  const code = document.getElementById('stockSelect').value;
  const range = parseInt(document.getElementById('rangeSelect').value);
  let data = STOCK_DATA[code] || [];
  if (range > 0 && data.length > range) data = data.slice(data.length - range);

  if (data.length === 0) {
    document.getElementById('dataInfo').textContent = 'no data loaded';
    document.getElementById('signalPanel').innerHTML = '';
    document.getElementById('dataTable').innerHTML = '';
    return;
  }

  currentData = data;
  document.getElementById('dataInfo').textContent = `${data.length} days | ${fmtDate(data[0].date)} ~ ${fmtDate(data[data.length-1].date)}`;

  const ind = computeAll(data);
  render(data, ind);
  renderSignals(data, ind);
  renderTable(data, ind);
}

// Event binding
function initEvents() {
  document.getElementById('stockSelect').addEventListener('change', update);
  document.getElementById('rangeSelect').addEventListener('change', update);

  document.getElementById('paramPanel').addEventListener('input', function(e) {
    const el = e.target;
    const key = el.dataset.key;
    const param = el.dataset.param;
    if (!key || !param) return;
    params[key][param] = parseFloat(el.value) || 0;
    // Sync range <-> number
    const siblings = el.parentElement.querySelectorAll(`[data-key="${key}"][data-param="${param}"]`);
    siblings.forEach(s => { if (s !== el) s.value = el.value; });
    update();
  });

  document.getElementById('paramPanel').addEventListener('click', function(e) {
    const el = e.target.closest('[data-toggle]');
    if (!el) return;
    const key = el.dataset.key;
    params[key].enabled = !params[key].enabled;
    el.classList.toggle('on');
    el.innerHTML = params[key].enabled ? '&#10003;' : '';
    // Enable/disable children
    el.parentElement.parentElement.querySelectorAll('input').forEach(inp => {
      inp.disabled = !params[key].enabled;
    });
    update();
  });
}

// Init
async function init() {
  await loadStockData();
  buildParamPanel();
  initEvents();
  update();
}
init();
