<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>技术指标交互工具</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<script src="data_raw.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f5f7fa;--card:#fff;--border:#e8eaed;--text:#333;--text2:#888;--text3:#bbb;--red:#e74c3c;--green:#27ae60;--blue:#5b8ff9;--purple:#8e44ad;--orange:#e67e22;--red-bg:#fcebeb;--green-bg:#eaf3de;--blue-bg:#e6f1fb;--purple-bg:#eeedfe;--orange-bg:#faeeda;--radius:10px;--radius-sm:6px}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);padding:16px}
.container{max-width:1100px;margin:0 auto}
.controls{display:flex;flex-wrap:wrap;gap:10px;align-items:center;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 18px;margin-bottom:10px}
.control-group{display:flex;align-items:center;gap:6px}
.control-group label{font-size:12px;color:var(--text2);white-space:nowrap}
.control-group select,.control-group input[type=number]{font-size:13px;border:1px solid var(--border);border-radius:var(--radius-sm);padding:5px 8px;background:var(--card);color:var(--text)}
.param-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:8px;margin-bottom:10px}
.param-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px}
.param-card .head{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.param-card .head .name{font-size:13px;font-weight:500;display:flex;align-items:center;gap:6px}
.param-card .head .name .dot{width:10px;height:10px;border-radius:2px;display:inline-block}
.param-card .body{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.param-card label{font-size:11px;color:var(--text2)}
.param-card input[type=range]{flex:1;min-width:60px;height:4px}
.param-card input[type=number]{width:48px;font-size:12px;text-align:center;border:1px solid var(--border);border-radius:4px;padding:3px}
.toggle{width:16px;height:16px;border:1px solid var(--border);border-radius:3px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-size:10px;background:var(--card);color:transparent;transition:.15s}
.toggle.on{background:var(--blue);border-color:var(--blue);color:#fff}
.chart-wrap{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px;position:relative}
#mainChart{width:100%;height:580px}
.signal-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:10px}
.signal-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:12px;text-align:center}
.signal-card .label{font-size:11px;color:var(--text2);margin-bottom:2px}
.signal-card .value{font-size:22px;font-weight:500;margin:2px 0}
.signal-card .tag{font-size:11px;padding:2px 10px;border-radius:10px;display:inline-block;background:var(--bg);color:var(--text2)}
.table-wrap{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;margin-bottom:10px;overflow-x:auto}
.table-wrap .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.table-wrap .header span{font-size:13px;font-weight:500}
.table-wrap .header .note{font-size:11px;color:var(--text2);font-weight:400}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;color:var(--text2);font-weight:400;border-bottom:1px solid var(--border);padding:4px 6px}
td{padding:3px 6px;border-bottom:1px solid #f0f0f0;white-space:nowrap;font-variant-numeric:tabular-nums}
tr:hover td{background:#f8f9fa}
.up{color:var(--red)}.down{color:var(--green)}
.panel-label{position:absolute;font-size:11px;color:var(--text2);font-weight:500;pointer-events:none;z-index:10;padding:2px 8px;background:rgba(255,255,255,0.85);border-radius:4px;border:0.5px solid var(--border)}
@media(max-width:700px){.signal-grid{grid-template-columns:repeat(2,1fr)}.param-grid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div class="container">
<div class="controls" id="controlsBar">
  <div class="control-group">
    <label>stock</label>
    <select id="stockSelect" style="width:140px">
      <option value="002594.SZ">比亚迪 002594.SZ</option>
      <option value="600031.SH">三一重工 600031.SH</option>
      <option value="600900.SH">长江电力 600900.SH</option>
      <option value="688981.SH">中芯国际 688981.SH</option>
    </select>
  </div>
  <div class="control-group">
    <label>range</label>
    <select id="rangeSelect" style="width:90px">
      <option value="365">1 year</option><option value="180">6 months</option>
      <option value="90">3 months</option><option value="0">all</option>
    </select>
  </div>
  <div class="control-group" style="margin-left:auto">
    <span id="dataInfo" style="font-size:11px;color:var(--text2)"></span>
  </div>
</div>
<div class="param-grid" id="paramPanel"></div>
<div class="chart-wrap" id="chartWrap">
  <div id="mainChart"></div>
</div>
<div class="signal-grid" id="signalPanel"></div>
<div class="table-wrap" id="tableWrap">
  <div class="header"><span>recent data</span><span class="note" id="tableInfo"></span></div>
  <div style="overflow-x:auto"><table id="dataTable"><thead></thead><tbody></tbody></table></div>
</div>
</div>
<script>
const STOCK_DATA = {};
async function loadStockData() {
  const codes = ['002594.SZ','600031.SH','600900.SH','688981.SH'];
  let loaded = 0;
  for (const code of codes) {
    try {
      const resp = await fetch(`data/raw/${code}_20250703_20260703.csv`);
      if (!resp.ok) throw Error();
      const text = await resp.text();
      const rows = text.trim().split('\n').slice(1);
      STOCK_DATA[code] = rows.map(r => { const c = r.split(','); return { date: c[1], open: +c[2], high: +c[3], low: +c[4], close: +c[5], pct_chg: +c[8], vol: +c[9] }; });
      loaded++;
    } catch(e) {
      if (window.STOCK_DATA_EMBEDDED && window.STOCK_DATA_EMBEDDED[code]) {
        STOCK_DATA[code] = window.STOCK_DATA_EMBEDDED[code].map(d => ({ date: String(d[0]), open: d[1], high: d[2], low: d[3], close: d[4], pct_chg: d[5], vol: d[6] }));
        loaded++;
      }
    }
  }
  if (!loaded) document.getElementById('dataInfo').textContent = 'data load failed';
}
// --- indicator calculators ---
function calcRSI(d, p) {
  const r = new Array(d.length).fill(null); if (d.length < p + 1) return r;
  let g = 0, l = 0;
  for (let i = 1; i <= p; i++) { const ch = d[i].close - d[i-1].close; g += Math.max(ch,0); l += Math.max(-ch,0); }
  let ag = g / p, al = l / p; r[p] = al ? 100 - 100 / (1 + ag / al) : 100;
  for (let i = p + 1; i < d.length; i++) { const ch = d[i].close - d[i-1].close; ag = (ag * (p - 1) + Math.max(ch,0)) / p; al = (al * (p - 1) + Math.max(-ch,0)) / p; r[i] = al ? 100 - 100 / (1 + ag / al) : 100; }
  return r;
}
function calcEMA(d, p) {
  const k = 2 / (p + 1), r = new Array(d.length).fill(null); let s = 0;
  for (let i = 0; i < p && i < d.length; i++) s += d[i];
  r[p - 1] = s / p;
  for (let i = p; i < d.length; i++) r[i] = (d[i] - r[i-1]) * k + r[i-1];
  return r;
}
function calcMACD(d, f, s, sig) {
  const c = d.map(x => x.close), ef = calcEMA(c, f), es = calcEMA(c, s);
  const dif = ef.map((v, i) => v !== null && es[i] !== null ? v - es[i] : null);
  const vd = dif.filter(v => v !== null), ea = calcEMA(vd, sig);
  let idx = 0; const dea = dif.map(v => v !== null ? ea[idx++] : null);
  const hist = dif.map((v, i) => v !== null && dea[i] !== null ? v - dea[i] : null);
  return { dif, dea, hist };
}
function calcBB(d, p, s) {
  const u = new Array(d.length).fill(null), m = new Array(d.length).fill(null), l = new Array(d.length).fill(null), bw = new Array(d.length).fill(null), pb = new Array(d.length).fill(null);
  for (let i = p - 1; i < d.length; i++) { let sum = 0, sq = 0; for (let j = i - p + 1; j <= i; j++) { sum += d[j].close; sq += d[j].close * d[j].close; } const mn = sum / p, sd = Math.sqrt(sq / p - mn * mn); m[i] = mn; u[i] = mn + s * sd; l[i] = mn - s * sd; bw[i] = ((u[i] - l[i]) / m[i]) * 100; pb[i] = (d[i].close - l[i]) / (u[i] - l[i]); }
  return { upper: u, mid: m, lower: l, bandwidth: bw, pctb: pb };
}
function calcATR(d, p) {
  const tr = new Array(d.length).fill(null);
  for (let i = 1; i < d.length; i++) tr[i] = Math.max(d[i].high - d[i].low, Math.abs(d[i].high - d[i-1].close), Math.abs(d[i].low - d[i-1].close));
  const atr = new Array(d.length).fill(null); let sum = 0;
  for (let i = 1; i <= p && i < d.length; i++) sum += tr[i];
  atr[p] = sum / p;
  for (let i = p + 1; i < d.length; i++) atr[i] = (atr[i-1] * (p - 1) + tr[i]) / p;
  return { tr, atr };
}
// --- app ---
let chart = null;
const DEFAULTS = { rsi: { period: 14, enabled: true }, macd: { fast: 12, slow: 26, signal: 9, enabled: true }, bb: { period: 20, std: 2, enabled: true }, atr: { period: 14, enabled: true } };
const P = JSON.parse(JSON.stringify(DEFAULTS));
function fmt(d) { const s = String(d); return s ? s.slice(0,4) + '-' + s.slice(4,6) + '-' + s.slice(6,8) : ''; }
function buildPanel() {
  document.getElementById('paramPanel').innerHTML = `
    <div class="param-card"><div class="head"><span class="name"><span class="dot" style="background:var(--purple)"></span>rsi</span><span style="font-size:11px;color:var(--text2)">period</span></div><div class="body"><div class="toggle ${P.rsi.enabled?'on':''}" data-k="rsi" data-t>${P.rsi.enabled?'\u2713':''}</div><input type="range" min="2" max="50" value="${P.rsi.period}" data-k="rsi" data-p="period" ${P.rsi.enabled?'':'disabled'}><input type="number" min="2" max="50" value="${P.rsi.period}" data-k="rsi" data-p="period" ${P.rsi.enabled?'':'disabled'}></div></div>
    <div class="param-card"><div class="head"><span class="name"><span class="dot" style="background:var(--blue)"></span>macd</span><span style="font-size:11px;color:var(--text2)">fast / slow / signal</span></div><div class="body"><div class="toggle ${P.macd.enabled?'on':''}" data-k="macd" data-t>${P.macd.enabled?'\u2713':''}</div><label>f</label><input type="number" min="2" max="100" value="${P.macd.fast}" data-k="macd" data-p="fast" ${P.macd.enabled?'':'disabled'} style="width:40px"><label>s</label><input type="number" min="2" max="100" value="${P.macd.slow}" data-k="macd" data-p="slow" ${P.macd.enabled?'':'disabled'} style="width:40px"><label>sig</label><input type="number" min="2" max="50" value="${P.macd.signal}" data-k="macd" data-p="signal" ${P.macd.enabled?'':'disabled'} style="width:40px"></div></div>
    <div class="param-card"><div class="head"><span class="name"><span class="dot" style="background:var(--green)"></span>bollinger</span><span style="font-size:11px;color:var(--text2)">period / std</span></div><div class="body"><div class="toggle ${P.bb.enabled?'on':''}" data-k="bb" data-t>${P.bb.enabled?'\u2713':''}</div><label>p</label><input type="number" min="2" max="100" value="${P.bb.period}" data-k="bb" data-p="period" ${P.bb.enabled?'':'disabled'} style="width:44px"><label>\u03c3</label><input type="number" min="0.5" max="5" step="0.5" value="${P.bb.std}" data-k="bb" data-p="std" ${P.bb.enabled?'':'disabled'} style="width:44px"></div></div>
    <div class="param-card"><div class="head"><span class="name"><span class="dot" style="background:var(--orange)"></span>atr</span><span style="font-size:11px;color:var(--text2)">period</span></div><div class="body"><div class="toggle ${P.atr.enabled?'on':''}" data-k="atr" data-t>${P.atr.enabled?'\u2713':''}</div><input type="range" min="2" max="50" value="${P.atr.period}" data-k="atr" data-p="period" ${P.atr.enabled?'':'disabled'}><input type="number" min="2" max="50" value="${P.atr.period}" data-k="atr" data-p="period" ${P.atr.enabled?'':'disabled'}></div></div>`;
}
function compute(d) {
  const r = P.rsi.enabled ? calcRSI(d, P.rsi.period) : [];
  const m = P.macd.enabled ? calcMACD(d, P.macd.fast, P.macd.slow, P.macd.signal) : { dif: [], dea: [], hist: [] };
  const b = P.bb.enabled ? calcBB(d, P.bb.period, P.bb.std) : { upper: [], mid: [], lower: [], bandwidth: [], pctb: [] };
  const a = P.atr.enabled ? calcATR(d, P.atr.period) : { tr: [], atr: [] };
  return { rsi: r, macd: m, bb: b, atr: a };
}
function render(d, ind) {
  if (!chart) { chart = echarts.init(document.getElementById('mainChart')); window.addEventListener('resize', () => chart.resize()); }
  const dates = d.map(x => fmt(x.date)), closes = d.map(x => x.close);
  const panels = [{ id: 'price', label: 'price + rsi' }];
  if (P.macd.enabled) panels.push({ id: 'macd', label: 'macd' });
  if (P.bb.enabled) panels.push({ id: 'bollinger', label: 'bollinger bands' });
  if (P.atr.enabled) panels.push({ id: 'atr', label: 'atr' });
  const hs = { price: 3, macd: 1.2, bollinger: 1.2, atr: 0.8 };
  const th = panels.reduce((s, p) => s + hs[p.id], 0);
  let ct = 1;
  const gds = panels.map(p => { const pct = hs[p.id] / th * 94; const g = { left: '55', right: '20', top: ct + '%', height: pct + '%', id: p.id, label: p.label }; ct += pct + 0.3; return g; });
  const xA = [], yA = [], ser = [];
  // Panel 0: Price + RSI overlay
  xA.push({ type: 'category', data: dates, gridIndex: 0, axisLine: { show: false }, axisTick: { show: false }, axisLabel: { show: false } });
  yA.push({ type: 'value', gridIndex: 0, splitLine: { lineStyle: { color: '#f0f0f0', type: 'dashed' } }, axisLabel: { fontSize: 10, color: '#999' }, name: 'price', nameTextStyle: { fontSize: 10, color: '#999' } });
  ser.push({ name: 'close', type: 'line', data: closes, xAxisIndex: 0, yAxisIndex: 0, smooth: true, symbol: 'none', lineStyle: { width: 1.5, color: '#e74c3c' }, areaStyle: { color: { type: 'linear', x: 0, y: 0, x2: 0, y2: 1, colorStops: [{ offset: 0, color: 'rgba(231,76,60,0.2)' }, { offset: 1, color: 'rgba(231,76,60,0.02)' }] } } });
  // RSI on price panel (right y-axis)
  if (P.rsi.enabled && ind.rsi.some(v => v !== null)) {
    yA[0].name = 'price / rsi';
    yA.push({ type: 'value', gridIndex: 0, min: 0, max: 100, splitLine: { show: false }, axisLabel: { fontSize: 10, color: '#8e44ad' }, position: 'right', name: 'rsi', nameTextStyle: { fontSize: 10, color: '#8e44ad' } });
    ser.push({ name: 'rsi', type: 'line', data: ind.rsi, xAxisIndex: 0, yAxisIndex: 1, smooth: true, symbol: 'none', lineStyle: { width: 1, color: '#8e44ad', opacity: 0.8 },
      markLine: { silent: true, symbol: 'none', data: [{ yAxis: 70, lineStyle: { color: '#e74c3c', type: 'dashed', width: 0.5 } }, { yAxis: 30, lineStyle: { color: '#27ae60', type: 'dashed', width: 0.5 } }], label: { show: false } }
    });
  }
  let gi = 1;
  // MACD panel
  if (P.macd.enabled) {
    xA.push({ type: 'category', data: dates, gridIndex: gi, axisLine: { show: false }, axisTick: { show: false }, axisLabel: { show: false } });
    yA.push({ type: 'value', gridIndex: gi, splitLine: { lineStyle: { color: '#f0f0f0', type: 'dashed' } }, axisLabel: { fontSize: 10, color: '#999' } });
    if (ind.macd.dif.some(v => v !== null)) {
      ser.push({ name: 'macd-dif', type: 'line', data: ind.macd.dif, xAxisIndex: gi, yAxisIndex: gi, smooth: true, symbol: 'none', lineStyle: { width: 1, color: '#e74c3c' } });
      ser.push({ name: 'macd-dea', type: 'line', data: ind.macd.dea, xAxisIndex: gi, yAxisIndex: gi, smooth: true, symbol: 'none', lineStyle: { width: 1, color: '#5b8ff9' } });
      ser.push({ name: 'macd-hist', type: 'bar', data: ind.macd.hist, xAxisIndex: gi, yAxisIndex: gi, barWidth: '50%', itemStyle: { color: p => p.value >= 0 ? '#e74c3c' : '#27ae60', opacity: 0.4 } });
    }
    gi++;
  }
  // Bollinger panel (standalone)
  if (P.bb.enabled && ind.bb.upper.some(v => v !== null)) {
    xA.push({ type: 'category', data: dates, gridIndex: gi, axisLine: { show: false }, axisTick: { show: false }, axisLabel: { show: false } });
    yA.push({ type: 'value', gridIndex: gi, splitLine: { lineStyle: { color: '#f0f0f0', type: 'dashed' } }, axisLabel: { fontSize: 10, color: '#999' } });
    ser.push({ name: 'bb-upper', type: 'line', data: ind.bb.upper, xAxisIndex: gi, yAxisIndex: gi, smooth: true, symbol: 'none', lineStyle: { width: 0.8, color: '#5b8ff9', opacity: 0.5 } });
    ser.push({ name: 'bb-mid', type: 'line', data: ind.bb.mid, xAxisIndex: gi, yAxisIndex: gi, smooth: true, symbol: 'none', lineStyle: { width: 0.8, color: '#f39c12', opacity: 0.6 } });
    ser.push({ name: 'bb-lower', type: 'line', data: ind.bb.lower, xAxisIndex: gi, yAxisIndex: gi, smooth: true, symbol: 'none', lineStyle: { width: 0.8, color: '#5b8ff9', opacity: 0.5 }, areaStyle: { color: { type: 'linear', x: 0, y: 0, x2: 0, y2: 1, colorStops: [{ offset: 0, color: 'rgba(91,143,249,0.08)' }, { offset: 1, color: 'rgba(91,143,249,0.01)' }] } } });
    gi++;
  }
  // ATR panel (last gets x-axis labels)
  if (P.atr.enabled) {
    xA.push({ type: 'category', data: dates, gridIndex: gi, axisLine: { show: false }, axisTick: { show: false }, axisLabel: { fontSize: 10, color: '#999', interval: 50 } });
    yA.push({ type: 'value', gridIndex: gi, splitLine: { lineStyle: { color: '#f0f0f0', type: 'dashed' } }, axisLabel: { fontSize: 10, color: '#999' } });
    if (ind.atr.atr.some(v => v !== null)) ser.push({ name: 'atr', type: 'line', data: ind.atr.atr, xAxisIndex: gi, yAxisIndex: gi, smooth: true, symbol: 'none', lineStyle: { width: 1.2, color: '#e67e22' }, areaStyle: { color: { type: 'linear', x: 0, y: 0, x2: 0, y2: 1, colorStops: [{ offset: 0, color: 'rgba(230,126,34,0.3)' }, { offset: 1, color: 'rgba(230,126,34,0.02)' }] } } });
  }
  chart.setOption({
    tooltip: { trigger: 'axis', backgroundColor: 'rgba(255,255,255,0.96)', borderColor: '#e8e8e8', borderWidth: 1, textStyle: { color: '#333', fontSize: 12 },
      formatter: function(ps) { if (!ps.length) return ''; const idx = ps[0].dataIndex; const r = d[idx]; let h = `<div style="font-weight:500;margin-bottom:4px">${fmt(r.date)}</div><div>open: <b>${r.open.toFixed(2)}</b> &nbsp; close: <b>${r.close.toFixed(2)}</b></div><div>high: <b>${r.high.toFixed(2)}</b> &nbsp; low: <b>${r.low.toFixed(2)}</b></div><div>change: <b style="color:${r.pct_chg>=0?'#e74c3c':'#27ae60'}">${r.pct_chg.toFixed(2)}%</b></div>`; ps.forEach(p => { const v = p.value; if (v === null || v === undefined || v === '' || ['close','bb-upper','bb-mid','bb-lower'].includes(p.seriesName)) return; h += `<div>${p.seriesName}: <b>${typeof v === 'number' ? v.toFixed(2) : v}</b></div>`; }); return h; }
    },
    grid: gds,
    xAxis: xA, yAxis: yA,
    dataZoom: [{ type: 'inside', xAxisIndex: [0,1,2,3,4], start: 0, end: 100 }],
    series: ser
  }, true);
}
function signals(d, ind) {
  const last = d[d.length-1], rv = ind.rsi[ind.rsi.length-1], md = ind.macd.dif[ind.macd.dif.length-1], ma = ind.macd.dea[ind.macd.dea.length-1];
  const bu = ind.bb.upper[ind.bb.upper.length-1], bl = ind.bb.lower[ind.bb.lower.length-1], pb = ind.bb.pctb[ind.bb.pctb.length-1], av = ind.atr.atr[ind.atr.atr.length-1];
  let rs = 'neutral', rc = 'var(--text2)', rb = 'var(--bg)';
  if (rv !== null) { if (rv > 70) { rs = 'overbought'; rc = 'var(--red)'; rb = 'var(--red-bg)'; } else if (rv < 30) { rs = 'oversold'; rc = 'var(--green)'; rb = 'var(--green-bg)'; } }
  let ms = '--', mc = 'var(--text2)', mb = 'var(--bg)';
  if (md !== null && ma !== null) { if (md > ma) { ms = 'bullish'; mc = 'var(--red)'; mb = 'var(--red-bg)'; } else { ms = 'bearish'; mc = 'var(--green)'; mb = 'var(--green-bg)'; } }
  let bs = '--', bc = 'var(--text2)', bb2 = 'var(--bg)';
  if (bu !== null) { if (last.close > bu) { bs = 'above upper'; bc = 'var(--red)'; bb2 = 'var(--red-bg)'; } else if (last.close < bl) { bs = 'below lower'; bc = 'var(--green)'; bb2 = 'var(--green-bg)'; } else bs = 'mid range'; }
  document.getElementById('signalPanel').innerHTML =
    `<div class="signal-card"><div class="label">rsi (${P.rsi.period})</div><div class="value" style="color:${rc}">${rv!==null?rv.toFixed(1):'--'}</div><div class="tag" style="background:${rb};color:${rc}">${rs}</div></div>
    <div class="signal-card"><div class="label">macd (${P.macd.fast}/${P.macd.slow}/${P.macd.signal})</div><div class="value" style="color:${mc}">${md!==null?md.toFixed(2):'--'}</div><div class="tag" style="background:${mb};color:${mc}">${ms}</div></div>
    <div class="signal-card"><div class="label">bollinger (${P.bb.period}, ${P.bb.std})</div><div class="value" style="color:var(--green)">${pb!==null?pb.toFixed(2):'--'}</div><div class="tag" style="background:${bb2};color:${bc}">%b = ${bs}</div></div>
    <div class="signal-card"><div class="label">atr (${P.atr.period})</div><div class="value" style="color:var(--orange)">${av!==null?av.toFixed(2):'--'}</div><div class="tag">${av!==null&&last?(av/last.close*100).toFixed(1)+'% of price':'--'}</div></div>`;
}
function table(d, ind) {
  const show = d.slice(-10), h = ['<thead><tr><th>date</th><th>open</th><th>high</th><th>low</th><th>close</th><th>chg%</th>'];
  if (P.rsi.enabled) h.push('<th>rsi</th>');
  if (P.macd.enabled) h.push('<th>dif</th><th>dea</th>');
  if (P.bb.enabled) h.push('<th>%b</th>');
  if (P.atr.enabled) h.push('<th>atr</th>');
  h.push('</tr></thead><tbody>');
  show.forEach(x => { const i = d.indexOf(x); const c = x.pct_chg >= 0 ? 'up' : 'down'; h.push(`<tr><td>${String(x.date).slice(4,6)}-${String(x.date).slice(6,8)}</td><td>${x.open.toFixed(2)}</td><td>${x.high.toFixed(2)}</td><td>${x.low.toFixed(2)}</td><td class="${c}">${x.close.toFixed(2)}</td><td class="${c}">${x.pct_chg.toFixed(2)}</td>`);
    if (P.rsi.enabled) h.push(`<td>${ind.rsi[i]!==null?ind.rsi[i].toFixed(1):'--'}</td>`);
    if (P.macd.enabled) h.push(`<td>${ind.macd.dif[i]!==null?ind.macd.dif[i].toFixed(2):'--'}</td><td>${ind.macd.dea[i]!==null?ind.macd.dea[i].toFixed(2):'--'}</td>`);
    if (P.bb.enabled) h.push(`<td>${ind.bb.pctb[i]!==null?ind.bb.pctb[i].toFixed(2):'--'}</td>`);
    if (P.atr.enabled) h.push(`<td>${ind.atr.atr[i]!==null?ind.atr.atr[i].toFixed(2):'--'}</td>`);
    h.push('</tr>');
  });
  h.push('</tbody>');
  document.getElementById('dataTable').innerHTML = h.join('');
  document.getElementById('tableInfo').textContent = `showing last ${show.length} of ${d.length} rows`;
}
function update() {
  const code = document.getElementById('stockSelect').value;
  const range = parseInt(document.getElementById('rangeSelect').value);
  let d = STOCK_DATA[code] || [];
  if (range > 0 && d.length > range) d = d.slice(d.length - range);
  if (!d.length) { document.getElementById('dataInfo').textContent = 'no data'; return; }
  document.getElementById('dataInfo').textContent = d.length + ' days | ' + fmt(d[0].date) + ' ~ ' + fmt(d[d.length-1].date);
  const ind = compute(d); render(d, ind); signals(d, ind); table(d, ind);
}
function initEvents() {
  document.getElementById('stockSelect').addEventListener('change', update);
  document.getElementById('rangeSelect').addEventListener('change', update);
  document.getElementById('paramPanel').addEventListener('input', function(e) {
    const el = e.target, k = el.dataset.k, p = el.dataset.p; if (!k || !p) return;
    P[k][p] = parseFloat(el.value) || 0;
    el.parentElement.querySelectorAll(`[data-k="${k}"][data-p="${p}"]`).forEach(s => { if (s !== el) s.value = el.value; });
    update();
  });
  document.getElementById('paramPanel').addEventListener('click', function(e) {
    const el = e.target.closest('[data-t]'); if (!el) return;
    const k = el.dataset.k; P[k].enabled = !P[k].enabled; el.classList.toggle('on'); el.innerHTML = P[k].enabled ? '\u2713' : '';
    el.parentElement.parentElement.querySelectorAll('input').forEach(inp => inp.disabled = !P[k].enabled);
    update();
  });
}
async function init() { await loadStockData(); buildPanel(); initEvents(); update(); }
init();
</script>
</body>
</html>
