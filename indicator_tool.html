<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Technical Indicators</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:#f5f7fa;color:#333;padding:16px}.w{max-width:1100px;margin:0 auto}.b{display:flex;flex-wrap:wrap;gap:10px;align-items:center;background:#fff;border:1px solid #e0e0e0;border-radius:10px;padding:12px 16px;margin-bottom:10px;font-size:13px}.b select{font-size:13px;border:1px solid #ddd;border-radius:6px;padding:4px 8px;background:#fff}#i{font-size:11px;color:#888;margin-left:auto}.g{display:grid;grid-template-columns:repeat(auto-fit,minmax(165px,1fr));gap:8px;margin-bottom:10px}.c{background:#fff;border:1px solid #e8eaed;border-radius:10px;padding:10px 14px}.c .h{display:flex;justify-content:space-between;margin-bottom:6px;font-size:13px;font-weight:500;align-items:center}.c .b{display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:12px;border:none;margin:0;padding:0;background:transparent}.c .b input[type=range]{flex:1;min-width:50px;height:4px}.c .b input[type=number]{width:46px;text-align:center;border:1px solid #ddd;border-radius:4px;padding:3px;font-size:12px}.t{width:16px;height:16px;border:1px solid #ccc;border-radius:3px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-size:10px;background:#fff;color:transparent;user-select:none}.t.on{background:#5b8ff9;border-color:#5b8ff9;color:#fff}.cw{background:#fff;border:1px solid #e8eaed;border-radius:10px;padding:12px;margin-bottom:10px}#ch{width:100%;height:560px}.s{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:10px}.s>div{background:#fff;border:1px solid #e8eaed;border-radius:10px;padding:12px;text-align:center;font-size:12px}.s .v{font-size:22px;font-weight:500;margin:3px 0}.s .tg{font-size:11px;padding:2px 10px;border-radius:10px;display:inline-block;background:#f5f5f5;color:#666}.tb{background:#fff;border:1px solid #e8eaed;border-radius:10px;padding:12px 14px;overflow-x:auto}.tb .hd{display:flex;justify-content:space-between;margin-bottom:6px;font-size:13px;font-weight:500}.tb .hd .n{font-size:11px;color:#888;font-weight:400}table{width:100%;border-collapse:collapse;font-size:12px}th{text-align:left;color:#888;font-weight:400;border-bottom:1px solid #eee;padding:4px 6px}td{padding:3px 6px;border-bottom:1px solid #f5f5f5;font-variant-numeric:tabular-nums}tr:hover td{background:#f8f9fa}.r{color:#e74c3c}.g{color:#27ae60}@media(max-width:700px){.s{grid-template-columns:repeat(2,1fr)}.g{grid-template-columns:1fr 1fr}}</style>
</head>
<body>
<div class="w"><div class="b"><label>stock</label><select id="s" style="width:140px"><option value="002594.SZ">比亚迪 002594.SZ</option><option value="600031.SH">三一重工 600031.SH</option><option value="600900.SH">长江电力 600900.SH</option><option value="688981.SH">中芯国际 688981.SH</option></select><label>range</label><select id="r" style="width:85px"><option value="365">1 year</option><option value="180">6 months</option><option value="90">3 months</option><option value="0">all</option></select><span id="i"></span></div><div class="g" id="pg"></div><div class="cw"><div id="ch"></div></div><div class="s" id="sg"></div><div class="tb"><div class="hd"><span>recent data</span><span class="n" id="ti"></span></div><table id="t"><thead></thead><tbody></tbody></table></div></div>
<script src="data_raw.js"></script>
<script>function rsi(d,p){
  var r=Array(d.length).fill(null);if(d.length<p+1)return r;var g=0,l=0;
  for(var i=1;i<=p;i++){var c=d[i].close-d[i-1].close;g+=Math.max(c,0);l+=Math.max(-c,0)}
  var ag=g/p,al=l/p;r[p]=al?100-100/(1+ag/al):100;
  for(var i=p+1;i<d.length;i++){var c=d[i].close-d[i-1].close;ag=(ag*(p-1)+Math.max(c,0))/p;al=(al*(p-1)+Math.max(-c,0))/p;r[i]=al?100-100/(1+ag/al):100}
  return r
}
function em(d,p){var k=2/(p+1),r=Array(d.length).fill(null),s=0;for(var i=0;i<p&&i<d.length;i++)s+=d[i];r[p-1]=s/p;for(var i=p;i<d.length;i++)r[i]=(d[i]-r[i-1])*k+r[i-1];return r}
function mc(d,f,s,sg){
  var c=d.map(function(x){return x.close}),e=em(c,f),es=em(c,s),di=[];
  for(var i=0;i<d.length;i++)di.push(e[i]!==null&&es[i]!==null?e[i]-es[i]:null);
  var vd=[];for(var i=0;i<di.length;i++){if(di[i]!==null)vd.push(di[i])}
  var ea=em(vd,sg),idx=0,de=[],hi=[];
  for(var i=0;i<di.length;i++)de.push(di[i]!==null?ea[idx++]:null);
  for(var i=0;i<di.length;i++)hi.push(di[i]!==null&&de[i]!==null?di[i]-de[i]:null);
  return{dif:di,dea:de,hist:hi}
}
function bb(d,p,sd){
  var u=[],m=[],l=[],bw=[],pb=[];for(var i=0;i<d.length;i++){u.push(null);m.push(null);l.push(null);bw.push(null);pb.push(null)}
  for(var i=p-1;i<d.length;i++){var sum=0,sq=0;for(var j=i-p+1;j<=i;j++){sum+=d[j].close;sq+=d[j].close*d[j].close}var mn=sum/p,st=Math.sqrt(sq/p-mn*mn);m[i]=mn;u[i]=mn+sd*st;l[i]=mn-sd*st;bw[i]=(u[i]-l[i])/m[i]*100;pb[i]=(d[i].close-l[i])/(u[i]-l[i])}
  return{upper:u,mid:m,lower:l,bandwidth:bw,pctb:pb}
}
function at(d,p){
  var tr=Array(d.length).fill(null);for(var i=1;i<d.length;i++)tr[i]=Math.max(d[i].high-d[i].low,Math.abs(d[i].high-d[i-1].close),Math.abs(d[i].low-d[i-1].close));
  var a=Array(d.length).fill(null),sum=0;for(var i=1;i<=p&&i<d.length;i++)sum+=tr[i];a[p]=sum/p;
  for(var i=p+1;i<d.length;i++)a[i]=(a[i-1]*(p-1)+tr[i])/p;return{tr:tr,atr:a}
}
function fd(s){return s.slice(0,4)+"-"+s.slice(4,6)+"-"+s.slice(6,8)}
var ch=null,P={rsi:{p:14,e:true},macd:{f:12,s:26,sg:9,e:true},bb:{p:20,sd:2,e:true},atr:{p:14,e:true}}
function bp(){
  function c(name,color,body){return'<div class=c><div class=h><span style=display:flex;align-items:center;gap:6px><span style=width:10px;height:10px;border-radius:2px;background:'+color+';display:inline-block></span>'+name+'</span></div><div class=b>'+body+'</div></div>'}
  function t(k){var on=P[k].e?" on":"";var ck=P[k].e?"\u2713":"";return'<div class=t'+on+'" data-k='+k+' data-t>'+ck+'</div>'}
  function r(k,par,mn,mx){var dis=P[k].e?"":" disabled";return'<input type=range min='+mn+' max='+mx+' value='+P[k][par]+' data-k='+k+' data-p='+par+dis+'>'}
  function n(k,par,w){var dis=P[k].e?"":" disabled";return'<input type=number min=1 max=999 value='+P[k][par]+' data-k='+k+' data-p='+par+dis+' style=width:'+(w||46)+'px>'}
  document.getElementById("pg").innerHTML=
    c("rsi","#8e44ad",t("rsi")+'<label style=font-size:11px;color:#888>period</label>'+r("rsi","p",2,50)+n("rsi","p"))+
    c("macd","#5b8ff9",t("macd")+'<label style=font-size:11px;color:#888>f</label>'+n("macd","f",40)+'<label style=font-size:11px;color:#888>s</label>'+n("macd","s",40)+'<label style=font-size:11px;color:#888>sig</label>'+n("macd","sg",40))+
    c("bollinger","#27ae60",t("bb")+'<label style=font-size:11px;color:#888>p</label>'+n("bb","p",44)+'<label style=font-size:11px;color:#888>\u03c3</label>'+n("bb","sd",44))+
    c("atr","#e67e22",t("atr")+'<label style=font-size:11px;color:#888>period</label>'+r("atr","p",2,50)+n("atr","p"))
}
function ca(d){return{rsi:P.rsi.e?rsi(d,P.rsi.p):[],macd:P.macd.e?mc(d,P.macd.f,P.macd.s,P.macd.sg):{dif:[],dea:[],hist:[]},bb:P.bb.e?bb(d,P.bb.p,P.bb.sd):{upper:[],mid:[],lower:[],bandwidth:[],pctb:[]},atr:P.atr.e?at(d,P.atr.p):{tr:[],atr:[]}}}
function dr(d,ind){
  if(!ch){ch=echarts.init(document.getElementById("ch"));window.addEventListener("resize",function(){ch.resize()})}
  var da=d.map(function(x){return fd(x.date)}),cl=d.map(function(x){return x.close}),pn=[{id:"p",h:3}]
  if(P.macd.e)pn.push({id:"m",h:1.2});if(P.bb.e)pn.push({id:"b",h:1.2});if(P.atr.e)pn.push({id:"a",h:0.8})
  var th=pn.reduce(function(s,p){return s+p.h},0),ct=1,gd=pn.map(function(p){var pct=p.h/th*94;var g={left:55,right:20,top:ct+"%",height:pct+"%"};ct+=pct+0.3;return g})
  var xA=[],yA=[],se=[],lg=pn.length-1
  xA.push({type:"category",data:da,gridIndex:0,axisLine:{show:false},axisTick:{show:false},axisLabel:{show:false}})
  yA.push({type:"value",gridIndex:0,splitLine:{lineStyle:{color:"#f0f0f0",type:"dashed"}},axisLabel:{fontSize:10,color:"#999"}})
  se.push({name:"price",type:"line",data:cl,xAxisIndex:0,yAxisIndex:0,smooth:true,symbol:"none",lineStyle:{width:1.5,color:"#e74c3c"},areaStyle:{color:{type:"linear",x:0,y:0,x2:0,y2:1,colorStops:[{offset:0,color:"rgba(231,76,60,0.15)"},{offset:1,color:"rgba(231,76,60,0.02)"}]}}})
  if(P.rsi.e&&ind.rsi.some(function(v){return v!==null})){
    yA.push({type:"value",gridIndex:0,min:0,max:100,splitLine:{show:false},axisLabel:{fontSize:10,color:"#8e44ad"},position:"right",nameTextStyle:{fontSize:10,color:"#8e44ad"}})
    se.push({name:"RSI",type:"line",data:ind.rsi,xAxisIndex:0,yAxisIndex:1,smooth:true,symbol:"none",lineStyle:{width:1,color:"#8e44ad",opacity:0.7}})
  }
  var gi=1
  if(P.macd.e){
    xA.push({type:"category",data:da,gridIndex:gi,axisLine:{show:false},axisTick:{show:false},axisLabel:{show:false}})
    yA.push({type:"value",gridIndex:gi,splitLine:{lineStyle:{color:"#f0f0f0",type:"dashed"}},axisLabel:{fontSize:10,color:"#999"},nameTextStyle:{fontSize:10,color:"#999"}})
    se.push({name:"DIF",type:"line",data:ind.macd.dif,xAxisIndex:gi,yAxisIndex:gi,smooth:true,symbol:"none",lineStyle:{width:1,color:"#e74c3c"}})
    se.push({name:"DEA",type:"line",data:ind.macd.dea,xAxisIndex:gi,yAxisIndex:gi,smooth:true,symbol:"none",lineStyle:{width:1,color:"#5b8ff9"}})
    se.push({name:"hist",type:"bar",data:ind.macd.hist,xAxisIndex:gi,yAxisIndex:gi,barWidth:"50%",itemStyle:{color:function(p){return p.value>=0?"#e74c3c":"#27ae60"},opacity:0.35}});gi++
  }
  if(P.bb.e&&ind.bb.upper.some(function(v){return v!==null})){
    xA.push({type:"category",data:da,gridIndex:gi,axisLine:{show:false},axisTick:{show:false},axisLabel:{show:false}})
    yA.push({type:"value",gridIndex:gi,splitLine:{lineStyle:{color:"#f0f0f0",type:"dashed"}},axisLabel:{fontSize:10,color:"#999"},nameTextStyle:{fontSize:10,color:"#999"}})
    se.push({name:"up",type:"line",data:ind.bb.upper,xAxisIndex:gi,yAxisIndex:gi,smooth:true,symbol:"none",lineStyle:{width:0.8,color:"#5b8ff9",opacity:0.5}})
    se.push({name:"mid",type:"line",data:ind.bb.mid,xAxisIndex:gi,yAxisIndex:gi,smooth:true,symbol:"none",lineStyle:{width:0.8,color:"#f39c12",opacity:0.6}})
    se.push({name:"low",type:"line",data:ind.bb.lower,xAxisIndex:gi,yAxisIndex:gi,smooth:true,symbol:"none",lineStyle:{width:0.8,color:"#5b8ff9",opacity:0.5}});gi++
  }
  if(P.atr.e){
    xA.push({type:"category",data:da,gridIndex:gi,axisLine:{show:false},axisTick:{show:false},axisLabel:gi===lg?{fontSize:10,color:"#999",interval:50}:{show:false}})
    yA.push({type:"value",gridIndex:gi,splitLine:{lineStyle:{color:"#f0f0f0",type:"dashed"}},axisLabel:{fontSize:10,color:"#999"},nameTextStyle:{fontSize:10,color:"#999"}})
    if(ind.atr.atr.some(function(v){return v!==null}))se.push({name:"ATR",type:"line",data:ind.atr.atr,xAxisIndex:gi,yAxisIndex:gi,smooth:true,symbol:"none",lineStyle:{width:1.2,color:"#e67e22"}})
  }
  ch.setOption({
    tooltip:{trigger:"axis",backgroundColor:"rgba(255,255,255,0.96)",borderColor:"#e8e8e8",borderWidth:1,
      formatter:function(ps){if(!ps.length)return"";var i=ps[0].dataIndex,r=d[i];var h="<b>"+fd(r.date)+"</b><br>O:"+r.open.toFixed(2)+" H:"+r.high.toFixed(2)+" L:"+r.low.toFixed(2)+" C:"+r.close.toFixed(2)+'<br>chg: <b style=color:'+(r.pct_chg>=0?"#e74c3c":"#27ae60")+">"+r.pct_chg.toFixed(2)+"%</b>"
      ps.forEach(function(p){var v=p.value;if(v==null||["price","up","mid","low"].indexOf(p.seriesName)>=0)return;h+="<br>"+p.seriesName+": <b>"+(typeof v==="number"?v.toFixed(2):v)+"</b>"});return h}}
    ,grid:gd,xAxis:xA,yAxis:yA,dataZoom:[{type:"inside",xAxisIndex:[0,1,2,3,4],start:0,end:100}],series:se
  })
}
function sg(d,ind){
  var l=d[d.length-1],rv=ind.rsi[ind.rsi.length-1],md=ind.macd.dif[ind.macd.dif.length-1],ma=ind.macd.dea[ind.macd.dea.length-1]
  var bu=ind.bb.upper[ind.bb.upper.length-1],bl=ind.bb.lower[ind.bb.lower.length-1],pb=ind.bb.pctb[ind.bb.pctb.length-1],av=ind.atr.atr[ind.atr.atr.length-1]
  var rs="neutral",rc="#666";if(rv!=null){if(rv>70){rs="overbought";rc="#e74c3c"}else if(rv<30){rs="oversold";rc="#27ae60"}}
  var ms="--",mc="#666";if(md!=null&&ma!=null){ms=md>ma?"bullish":"bearish";mc=md>ma?"#e74c3c":"#27ae60"}
  var bs="--",bc="#666";if(bu!=null){if(l.close>bu){bs="above upper";bc="#e74c3c"}else if(l.close<bl){bs="below lower";bc="#27ae60"}else bs="mid range"}
  var ai=av!=null&&l?(av/l.close*100).toFixed(1)+"% of price":"--"
  document.getElementById("sg").innerHTML=
    '<div><div style=font-size:11px;color:#888>rsi ('+P.rsi.p+')</div><div class=v style=color:'+rc+">"+(rv!=null?rv.toFixed(1):"--")+'</div><div class=tg style=color:'+rc+">"+rs+"</div></div>"+
    '<div><div style=font-size:11px;color:#888>macd ('+P.macd.f+"/"+P.macd.s+"/"+P.macd.sg+')</div><div class=v style=color:'+mc+">"+(md!=null?md.toFixed(2):"--")+'</div><div class=tg style=color:'+mc+">"+ms+"</div></div>"+
    '<div><div style=font-size:11px;color:#888>bollinger ('+P.bb.p+","+P.bb.sd+')</div><div class=v style=color:#27ae60>'+(pb!=null?pb.toFixed(2):"--")+'</div><div class=tg style=color:'+bc+">"+bs+"</div></div>"+
    '<div><div style=font-size:11px;color:#888>atr ('+P.atr.p+')</div><div class=v style=color:#e67e22>'+(av!=null?av.toFixed(2):"--")+'</div><div class=tg>'+ai+"</div></div>"
}
function tb(d,ind){
  var s=d.slice(-10),h='<thead><tr><th>date</th><th>open</th><th>high</th><th>low</th><th>close</th><th>chg%</th>'
  if(P.rsi.e)h+='<th>rsi</th>';if(P.macd.e)h+='<th>dif</th><th>dea</th>';if(P.bb.e)h+='<th>%b</th>';if(P.atr.e)h+='<th>atr</th>'
  h+='</tr></thead><tbody>'
  s.forEach(function(x){var i=d.indexOf(x),c=x.pct_chg>=0?"r":"g"
  h+='<tr><td>'+String(x.date).slice(4,6)+"-"+String(x.date).slice(6,8)+"</td><td>"+x.open.toFixed(2)+"</td><td>"+x.high.toFixed(2)+"</td><td>"+x.low.toFixed(2)+'</td><td class='+c+">"+x.close.toFixed(2)+'</td><td class='+c+">"+x.pct_chg.toFixed(2)+"</td>"
  if(P.rsi.e)h+='<td>'+(ind.rsi[i]!=null?ind.rsi[i].toFixed(1):"--")+"</td>"
  if(P.macd.e)h+='<td>'+(ind.macd.dif[i]!=null?ind.macd.dif[i].toFixed(2):"--")+'</td><td>'+(ind.macd.dea[i]!=null?ind.macd.dea[i].toFixed(2):"--")+"</td>"
  if(P.bb.e)h+='<td>'+(ind.bb.pctb[i]!=null?ind.bb.pctb[i].toFixed(2):"--")+"</td>"
  if(P.atr.e)h+='<td>'+(ind.atr.atr[i]!=null?ind.atr.atr[i].toFixed(2):"--")+"</td>"
  h+="</tr>"})
  h+='</tbody>';document.getElementById("t").innerHTML=h;document.getElementById("ti").textContent="showing last "+s.length+" of "+d.length+" rows"
}
function up(){
  var code=document.getElementById("s").value,rg=parseInt(document.getElementById("r").value)
  var d=window.STOCK_DATA_EMBEDDED&&window.STOCK_DATA_EMBEDDED[code]?JSON.parse(JSON.stringify(window.STOCK_DATA_EMBEDDED[code])):[]
  if(rg>0&&d.length>rg)d=d.slice(d.length-rg)
  if(!d.length){document.getElementById("i").textContent="no data";return}
  document.getElementById("i").textContent=d.length+" days | "+fd(d[0][0])+" ~ "+fd(d[d.length-1][0])
  var od=d.map(function(x){return{date:x[0],open:x[1],high:x[2],low:x[3],close:x[4],pct_chg:x[5],vol:x[6]}})
  var ind=ca(od);dr(od,ind);sg(od,ind);tb(od,ind)
}
bp()
document.getElementById("s").onchange=up;document.getElementById("r").onchange=up
document.getElementById("pg").addEventListener("input",function(e){
  var el=e.target,k=el.dataset.k,p=el.dataset.p;if(!k||!p)return
  P[k][p]=parseFloat(el.value)||0
  el.parentElement.querySelectorAll("[data-k='"+k+"'][data-p='"+p+"']").forEach(function(s){if(s!==el)s.value=el.value});up()
})
document.getElementById("pg").addEventListener("click",function(e){
  var el=e.target.closest("[data-t]");if(!el)return;var k=el.dataset.k
  P[k].e=!P[k].e;el.classList.toggle("on");el.innerHTML=P[k].e?"\u2713":""
  el.parentElement.parentElement.querySelectorAll("input").forEach(function(i){i.disabled=!P[k].e});up()
})
up()</script>
</body>
</html>
