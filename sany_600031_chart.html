                xAxisIndex: [0, 1],
                bottom: 2,
                height: 16,
                start: 0,
                end: 100,
                borderColor: '#ddd',
                backgroundColor: '#f7f7f7',
                fillerColor: 'rgba(91,143,249,0.2)',
                handleStyle: { color: '#5b8ff9' }
            }
        ],
        series: [
            {
                name: '收盘价',
                type: 'line',
                data: closePrices,
                xAxisIndex: 0,
                yAxisIndex: 0,
                smooth: true,
                symbol: 'none',
                lineStyle: { width: 2, color: '#e74c3c' },
                areaStyle: {
                    color: {
                        type: 'linear',
                        x: 0, y: 0, x2: 0, y2: 1,
                        colorStops: [
                            { offset: 0, color: 'rgba(231,76,60,0.30)' },
                            { offset: 1, color: 'rgba(231,76,60,0.02)' }
                        ]
                    }
                },
                markLine: {
                    silent: true,
                    data: [
                        { type: 'average', name: '均价' }
                    ],
                    lineStyle: { color: '#5b8ff9', type: 'dashed', width: 1 },
                    label: { color: '#5b8ff9', fontSize: 11, formatter: '均价 {value}' }
                }
            },
            {
                name: '成交量',
                type: 'bar',
                data: volumes,
                xAxisIndex: 1,
                yAxisIndex: 1,
                barWidth: '60%',
                itemStyle: {
                    color: {
                        type: 'linear',
                        x: 0, y: 0, x2: 0, y2: 1,
                        colorStops: [
                            { offset: 0, color: 'rgba(91,143,249,0.5)' },
                            { offset: 1, color: 'rgba(91,143,249,0.1)' }
                        ]
                    }
                }
            }
        ]
    };

    myChart.setOption(option);

    window.addEventListener('resize', function () {
        myChart.resize();
    });
})();
</script>
</body>
</html>
